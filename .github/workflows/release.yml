name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "tag to release (defaults to v0.0.0-dev)"
        required: false
        default: "v0.0.0-dev"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: build ${{ matrix.os }}/${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: client-linux
            kind: client
            build_name: remote-ssh-desktop
            artifact: remote-ssh-desktop-client-linux-x86_64
            script: scripts/build_client_linux.sh
            binary: dist/remote-ssh-desktop
          - os: ubuntu-22.04
            name: server-linux
            kind: server
            build_name: remote-ssh-desktop-server
            artifact: remote-ssh-desktop-server-linux-x86_64
            script: scripts/build_server_linux.sh
            binary: dist/remote-ssh-desktop-server
          - os: windows-2022
            name: client-windows
            kind: client
            build_name: remote-ssh-desktop
            artifact: remote-ssh-desktop-client-windows-x86_64
            script: scripts/build_client_windows.ps1
            binary: dist/remote-ssh-desktop.exe

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: install linux system packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb xauth xclip libx11-6 libxext6 libxtst6 libxfixes3 libxdamage1 \
            libxi6 libxrandr2 libxkbcommon0 libegl1 libxkbcommon-x11-0 \
            libdbus-1-3 libfontconfig1 libxcb-cursor0 libxcb-xinerama0 \
            libxcb-xinput0 libxcb-xkb1 libxcb-shape0 libxcb-render-util0 \
            libxcb-render0 libxcb-glx0 libxcb-image0 libxcb-keysyms1 \
            libxcb-icccm4 libxcb-sync1 libgl1 libgcc-s1 libstdc++6 \
            libpangocairo-1.0-0 libpango-1.0-0 libcairo2

      - name: install windows deps
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # No system deps required; PySide6 wheels bundle needed Qt runtime.
          Write-Host "windows deps ready"

      - name: cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-build.txt', 'pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: install python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: smoke test
        run: |
          python -c "import remote_ssh_desktop.client.main, remote_ssh_desktop.server.main, remote_ssh_desktop.crypto.keygen"
          python -m remote_ssh_desktop.crypto.keygen --help

      - name: test
        run: python -m pytest -q

      - name: build binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RSD_KIND: ${{ matrix.kind }}
          RSD_NAME: ${{ matrix.build_name }}
          PROJECT_ROOT: ${{ github.workspace }}
        run: ./scripts/build_client_windows.ps1

      - name: build binary (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: chmod +x scripts/*.sh && PROJECT_ROOT="$GITHUB_WORKSPACE" RSD_KIND=${{ matrix.kind }} RSD_NAME=${{ matrix.build_name }} bash ${{ matrix.script }}

      - name: layout release asset
        shell: bash
        run: |
          set -e
          artifact="${{ matrix.artifact }}"
          binary="${{ matrix.binary }}"
          if [ ! -f "$binary" ]; then
            echo "expected one-file PyInstaller binary not found: $binary" >&2
            find dist -maxdepth 3 -type f -print
            exit 1
          fi
          case "$binary" in
            *.exe) asset="dist/$artifact.exe" ;;
            *) asset="dist/$artifact" ;;
          esac
          cp "$binary" "$asset"
          chmod +x "$asset" || true
          ls -la dist

      - name: smoke run built artifact
        shell: bash
        run: |
          set -e
          artifact="${{ matrix.artifact }}"
          binary="${{ matrix.binary }}"
          case "$binary" in
            *.exe) asset="dist/$artifact.exe" ;;
            *) asset="dist/$artifact" ;;
          esac
          echo "--- smoke: $asset ($RUNNER_OS / ${{ matrix.kind }}) ---"
          if [[ "$RUNNER_OS" == "Linux" && "${{ matrix.kind }}" == "client" ]]; then
            timeout 30 "$asset" --version
            timeout 120 xvfb-run -a "$asset" --self-test
          elif [[ "$RUNNER_OS" == "Linux" && "${{ matrix.kind }}" == "server" ]]; then
            timeout 30 "$asset" --version
            timeout 120 "$asset" --self-test
          else
            "$asset" --version
            QT_QPA_PLATFORM=offscreen "$asset" --self-test-json
          fi

      - name: compute sha256
        shell: bash
        run: |
          cd dist
          : > SHA256SUMS.txt
          for f in remote-ssh-desktop-client-linux-x86_64 remote-ssh-desktop-server-linux-x86_64 remote-ssh-desktop-client-windows-x86_64.exe; do
            [ -e "$f" ] || continue
            sha256sum "$f" >> SHA256SUMS.txt
          done
          cat SHA256SUMS.txt

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/remote-ssh-desktop-client-linux-x86_64
            dist/remote-ssh-desktop-server-linux-x86_64
            dist/remote-ssh-desktop-client-windows-x86_64.exe
            dist/SHA256SUMS.txt

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: compute combined sha256 sums
        run: |
          cd artifacts
          : > SHA256SUMS.txt
          find . -type f \( -name 'remote-ssh-desktop-client-linux-x86_64' -o -name 'remote-ssh-desktop-server-linux-x86_64' -o -name 'remote-ssh-desktop-client-windows-x86_64.exe' \) -print0 | xargs -0 sha256sum >> SHA256SUMS.txt
          sort -o SHA256SUMS.txt SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: generate changelog
        id: changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os, subprocess
          tag = os.environ["GITHUB_REF_NAME"]
          os.chdir(os.environ.get("GITHUB_WORKSPACE", "."))
          try:
              prev = subprocess.check_output(["git", "describe", "--tags", "--abbrev=0", f"{tag}^"], text=True).strip()
              text = subprocess.check_output(["git", "log", f"{prev}..{tag}", "--pretty=%s"], text=True)
          except Exception:
              text = subprocess.check_output(["git", "log", tag, "--pretty=%s", "-n", "50"], text=True)
          bullets = "\n".join(f"- {line}" for line in text.strip().splitlines() if line.strip())
          body = (
              f"## Changes\n\n{bullets}\n\n"
              "## Artifacts\n\n"
              "| Platform | File |\n|---|---|\n"
              "| Linux client (x86_64) | `remote-ssh-desktop-client-linux-x86_64` |\n"
              "| Linux server (x86_64) | `remote-ssh-desktop-server-linux-x86_64` |\n"
              "| Windows client (x86_64) | `remote-ssh-desktop-client-windows-x86_64.exe` |\n\n"
              "SHA-256 checksums are in `SHA256SUMS.txt`."
          )
          with open(os.environ["GITHUB_OUTPUT"], "w") as fh:
              print(f"body<<EOF\n{body}\nEOF", file=fh)
          PY

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: ${{ steps.changelog.outputs.body }}
          files: |
            artifacts/**/remote-ssh-desktop-client-linux-x86_64
            artifacts/**/remote-ssh-desktop-server-linux-x86_64
            artifacts/**/remote-ssh-desktop-client-windows-x86_64.exe
            artifacts/**/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pypi:
    name: build & publish sdist/wheel
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install build
        run: python -m pip install --upgrade build twine
      - name: build sdist and wheel
        run: python -m build
      - name: publish to pypi
        if: contains(github.ref, '-') == false
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
