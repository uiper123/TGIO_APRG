name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "tag to release (defaults to v0.0.0-dev)"
        required: false
        default: "v0.0.0-dev"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.os }}/${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: client-linux
            kind: client
            artifact: remote-ssh-desktop-client-linux-x86_64
            build: pyinstaller --noconfirm --clean build_client_linux.spec
          - os: ubuntu-22.04
            name: server-linux
            kind: server
            artifact: remote-ssh-desktop-server-linux-x86_64
            build: pyinstaller --noconfirm --clean build_server_linux.spec
          - os: windows-2022
            name: client-windows
            kind: client
            artifact: remote-ssh-desktop-client-windows-x86_64
            build: pyinstaller --noconfirm --clean build_client_windows.spec
          - os: macos-13
            name: client-macos
            kind: client
            artifact: remote-ssh-desktop-client-macos-arm64
            build: pyinstaller --noconfirm --clean build_client_macos.spec

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: install linux system packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb xauth xclip libx11-6 libxext6 libxtst6 libxfixes3 libxdamage1 \
            libxi6 libxrandr2 libxkbcommon0 libegl1 libxkbcommon-x11-0 \
            libdbus-1-3 libfontconfig1 libxcb-cursor0 libxcb-xinerama0 \
            libxcb-xinput0 libxcb-xkb1 libxcb-shape0 libxcb-render-util0 \
            libxcb-render0 libxcb-glx0 libxcb-image0 libxcb-keysyms1 \
            libxcb-icccm4 libxcb-sync1 libgl1 libgcc-s1 libstdc++6 \
            libpangocairo-1.0-0 libpango-1.0-0 libcairo2

      - name: install macos deps
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install xquartz 2>/dev/null || true

      - name: cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-build.txt', 'pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: install python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: smoke test
        run: |
          python -c "import remote_ssh_desktop.client.main, remote_ssh_desktop.server.main, remote_ssh_desktop.crypto.keygen"
          python -m remote_ssh_desktop.crypto.keygen --help

      - name: build binary
        env:
          RSD_KIND: ${{ matrix.kind }}
          RSD_NAME: ${{ matrix.name }}
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            $env:RSD_KIND = "${{ matrix.kind }}"
            $env:RSD_NAME = "${{ matrix.name }}"
            ${{ matrix.build }}
          else
            RSD_KIND=${{ matrix.kind }} RSD_NAME=${{ matrix.name }} ${{ matrix.build }}
          fi

      - name: package linux server
        if: matrix.name == 'server-linux'
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp dist/remote-ssh-desktop-server dist/${{ matrix.artifact }}/remote-ssh-desktop-server || true
          chmod +x dist/${{ matrix.artifact }}/*
          (cd dist && tar -czf "${{ matrix.artifact }}.tar.gz" "${{ matrix.artifact }}")
          (cd dist && zip -r "${{ matrix.artifact }}.zip" "${{ matrix.artifact }}" >/dev/null)

      - name: package linux/macos client
        if: matrix.name == 'client-linux' || matrix.name == 'client-macos'
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          if [ -d dist/remote-ssh-desktop-client.app ]; then
            cp -R dist/remote-ssh-desktop-client.app dist/${{ matrix.artifact }}/
          else
            cp dist/remote-ssh-desktop-client dist/${{ matrix.artifact }}/
          fi
          (cd dist && tar -czf "${{ matrix.artifact }}.tar.gz" "${{ matrix.artifact }}")
          (cd dist && zip -r "${{ matrix.artifact }}.zip" "${{ matrix.artifact }}" >/dev/null)

      - name: package windows client
        if: matrix.name == 'client-windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist\remote-ssh-desktop-client -DestinationPath dist\${{ matrix.artifact }}.zip -Force
          Copy-Item dist\remote-ssh-desktop-client\* ${{ matrix.artifact }}\ -Recurse -Force

      - name: compute sha256
        shell: bash
        run: |
          cd dist
          for f in *.tar.gz *.zip; do
            [ -e "$f" ] || continue
            sha256sum "$f" >> SHA256SUMS.txt
          done
          if [ "$RUNNER_OS" == "Windows" ]; then
            powershell -Command "Get-ChildItem dist\*.zip | ForEach-Object { (Get-FileHash \$_.FullName -Algorithm SHA256).Hash.ToLower() + '  ' + \$_.Name } | Tee-Object -FilePath dist\SHA256SUMS.txt -Append"
          fi
          cat SHA256SUMS.txt

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: compute sha256 sums
        run: |
          cd artifacts
          for f in $(find . -type f \( -name '*.tar.gz' -o -name '*.zip' \)); do
            sha256sum "$f" >> SHA256SUMS.txt
          done
          sort -o SHA256SUMS.txt SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: generate changelog
        id: changelog
        run: |
          python - <<'PY'
          import os, subprocess, json, sys
          tag = os.environ["GITHUB_REF_NAME"]
          prev = subprocess.check_output(["git", "describe", "--tags", "--abbrev=0", f"{tag}^"], text=True).strip() if subprocess.call(["git", "rev-parse", f"{tag}^"], stderr=subprocess.DEVNULL) == 0 else ""
          os.chdir(os.environ.get("GITHUB_WORKSPACE", "."))
          if prev:
              text = subprocess.check_output(["git", "log", f"{prev}..{tag}", "--pretty=%s"], text=True)
          else:
              text = subprocess.check_output(["git", "log", tag, "--pretty=%s", "-n", "50"], text=True)
          bullets = "\n".join(f"- {line}" for line in text.strip().splitlines() if line.strip())
          body = f"## Changes\n\n{bullets}\n\n## Artifacts\n\n| Platform | File |\n|---|---|\n| Linux client (x86_64) | `remote-ssh-desktop-client-linux-x86_64.tar.gz` |\n| Linux server (x86_64) | `remote-ssh-desktop-server-linux-x86_64.tar.gz` |\n| Windows client (x86_64) | `remote-ssh-desktop-client-windows-x86_64.zip` |\n| macOS client (arm64) | `remote-ssh-desktop-client-macos-arm64.tar.gz` |\n\nSHA-256 checksums are in `SHA256SUMS.txt`."
          with open(os.environ["GITHUB_OUTPUT"], "w") as fh:
              print(f"body<<EOF\n{body}\nEOF", file=fh)
          PY

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: ${{ steps.changelog.outputs.body }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pypi:
    name: build & publish sdist/wheel
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install build
        run: python -m pip install --upgrade build twine
      - name: build sdist and wheel
        run: python -m build
      - name: publish to pypi
        if: contains(github.ref, '-') == false
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
