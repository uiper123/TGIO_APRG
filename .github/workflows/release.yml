name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "tag to release (defaults to v0.0.0-dev)"
        required: false
        default: "v0.0.0-dev"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.os }}/${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: client-linux
            kind: client
            artifact: remote-ssh-desktop-client-linux-x86_64
            script: scripts/build_client_linux.sh
            binary: dist/remote-ssh-desktop
          - os: ubuntu-22.04
            name: server-linux
            kind: server
            artifact: remote-ssh-desktop-server-linux-x86_64
            script: scripts/build_server_linux.sh
            binary: dist/remote-ssh-desktop-server
          - os: windows-2022
            name: client-windows
            kind: client
            artifact: remote-ssh-desktop-client-windows-x86_64
            script: scripts/build_client_windows.ps1
            binary: dist/remote-ssh-desktop.exe
          - os: macos-13
            name: client-macos
            kind: client
            artifact: remote-ssh-desktop-client-macos-arm64
            script: scripts/build_client_macos.sh
            binary: dist/remote-ssh-desktop

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: install linux system packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb xauth xclip libx11-6 libxext6 libxtst6 libxfixes3 libxdamage1 \
            libxi6 libxrandr2 libxkbcommon0 libegl1 libxkbcommon-x11-0 \
            libdbus-1-3 libfontconfig1 libxcb-cursor0 libxcb-xinerama0 \
            libxcb-xinput0 libxcb-xkb1 libxcb-shape0 libxcb-render-util0 \
            libxcb-render0 libxcb-glx0 libxcb-image0 libxcb-keysyms1 \
            libxcb-icccm4 libxcb-sync1 libgl1 libgcc-s1 libstdc++6 \
            libpangocairo-1.0-0 libpango-1.0-0 libcairo2

      - name: install macos deps
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install xquartz 2>/dev/null || true

      - name: install windows deps
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # No system deps required; PySide6 wheels bundle needed Qt runtime.
          Write-Host "windows deps ready"

      - name: cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-build.txt', 'pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: install python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: smoke test
        run: |
          python -c "import remote_ssh_desktop.client.main, remote_ssh_desktop.server.main, remote_ssh_desktop.crypto.keygen"
          python -m remote_ssh_desktop.crypto.keygen --help

      - name: build binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RSD_KIND: ${{ matrix.kind }}
          RSD_NAME: ${{ matrix.name }}
          PROJECT_ROOT: ${{ github.workspace }}
        run: ./scripts/build_client_windows.ps1

      - name: build binary (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: chmod +x scripts/*.sh && PROJECT_ROOT="$GITHUB_WORKSPACE" RSD_KIND=${{ matrix.kind }} RSD_NAME=${{ matrix.name }} bash ${{ matrix.script }}

      - name: layout artifact dir
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          if [ -d dist/remote-ssh-desktop.app ]; then
            cp -R dist/remote-ssh-desktop.app dist/${{ matrix.artifact }}/
          elif [ -d dist/remote-ssh-desktop.app ]; then
            cp -R dist/remote-ssh-desktop.app dist/${{ matrix.artifact }}/
          elif [ -f dist/remote-ssh-desktop.exe ]; then
            cp dist/remote-ssh-desktop.exe dist/${{ matrix.artifact }}/
          else
            cp dist/remote-ssh-desktop dist/${{ matrix.artifact }}/ || true
            cp dist/remote-ssh-desktop-server dist/${{ matrix.artifact }}/ || true
          fi

      - name: package archives
        shell: bash
        run: |
          cd dist
          if [ -d "${{ matrix.artifact }}" ]; then
            tar -czf "${{ matrix.artifact }}.tar.gz" "${{ matrix.artifact }}"
            zip -r "${{ matrix.artifact }}.zip" "${{ matrix.artifact }}" >/dev/null
          fi
          ls -la

      - name: compute sha256
        shell: bash
        run: |
          cd dist
          : > SHA256SUMS.txt
          for f in *.tar.gz *.zip; do
            [ -e "$f" ] || continue
            sha256sum "$f" >> SHA256SUMS.txt
          done
          cat SHA256SUMS.txt

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: compute combined sha256 sums
        run: |
          cd artifacts
          : > SHA256SUMS.txt
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0 | xargs -0 sha256sum >> SHA256SUMS.txt
          sort -o SHA256SUMS.txt SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: generate changelog
        id: changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os, subprocess
          tag = os.environ["GITHUB_REF_NAME"]
          os.chdir(os.environ.get("GITHUB_WORKSPACE", "."))
          try:
              prev = subprocess.check_output(["git", "describe", "--tags", "--abbrev=0", f"{tag}^"], text=True).strip()
              text = subprocess.check_output(["git", "log", f"{prev}..{tag}", "--pretty=%s"], text=True)
          except Exception:
              text = subprocess.check_output(["git", "log", tag, "--pretty=%s", "-n", "50"], text=True)
          bullets = "\n".join(f"- {line}" for line in text.strip().splitlines() if line.strip())
          body = (
              f"## Changes\n\n{bullets}\n\n"
              "## Artifacts\n\n"
              "| Platform | File |\n|---|---|\n"
              "| Linux client (x86_64) | `remote-ssh-desktop-client-linux-x86_64.tar.gz` |\n"
              "| Linux server (x86_64) | `remote-ssh-desktop-server-linux-x86_64.tar.gz` |\n"
              "| Windows client (x86_64) | `remote-ssh-desktop-client-windows-x86_64.zip` |\n"
              "| macOS client (arm64) | `remote-ssh-desktop-client-macos-arm64.tar.gz` |\n\n"
              "SHA-256 checksums are in `SHA256SUMS.txt`."
          )
          with open(os.environ["GITHUB_OUTPUT"], "w") as fh:
              print(f"body<<EOF\n{body}\nEOF", file=fh)
          PY

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: ${{ steps.changelog.outputs.body }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pypi:
    name: build & publish sdist/wheel
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install build
        run: python -m pip install --upgrade build twine
      - name: build sdist and wheel
        run: python -m build
      - name: publish to pypi
        if: contains(github.ref, '-') == false
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
